<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Goles PRO</title>

  <!-- ✅ CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<h2>⚽ Goles · BTTS · 1X2</h2>

<!-- ✅ NUEVO: Selector -->
<div class="card">
  <h4>SELECCIÓN DE PARTIDO</h4>

  <label>Liga</label>
  <select id="liga"></select>

  <label>Equipo Local</label>
  <select id="equipoLocal"></select>

  <label>Equipo Visitante</label>
  <select id="equipoVisitante"></select>
</div>

<!-- LOCAL -->
<div class="card">
  <h4>LOCAL</h4>

  <label>Fuerza Ofensiva Local (FOL)</label>
  <input type="number" id="fol" step="0.01">

  <label>Fuerza Defensiva Local (FDL)</label>
  <input type="number" id="fdl" step="0.01">

  <label>Promedio Goles Local Liga (PGLL)</label>
  <input type="number" id="pgll" step="0.01">
</div>

<!-- VISITANTE -->
<div class="card">
  <h4>VISITANTE</h4>

  <label>Fuerza Ofensiva Visitante (FOV)</label>
  <input type="number" id="fov" step="0.01">

  <label>Fuerza Defensiva Visitante (FDV)</label>
  <input type="number" id="fdv" step="0.01">

  <label>Promedio Goles Visitante Liga (PGVL)</label>
  <input type="number" id="pgvl" step="0.01">
</div>

<!-- RESULTADO -->
<div class="card">

  <label>Línea de goles</label>
  <input type="number" id="linea" step="0.5">

  <button class="calcular" onclick="calcular()">Calcular</button>
  <button class="limpiar" onclick="limpiar()">Limpiar</button>

  <div id="resultado" class="result"></div>

</div>

<!-- CUOTAS -->
<div class="card">
  <h4>CUOTAS</h4>

  <label>Cuota OVER</label>
  <input type="number" id="cuotaOver" step="0.01">

  <label>Cuota UNDER</label>
  <input type="number" id="cuotaUnder" step="0.01">

  <label>Cuota BTTS Sí</label>
  <input type="number" id="cuotaBTTSsi" step="0.01">

  <label>Cuota BTTS No</label>
  <input type="number" id="cuotaBTTSno" step="0.01">
</div>

<!-- ✅ JS -->
<script src="js/poisson.js"></script>
<script src="js/calculations.js"></script>
<script src="js/app.js"></script>

</body>
</html>
